<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>19 PvP Logs</title>
    <style>
    :root {
      color-scheme: dark;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    body {
      margin: 0;
      background: #101112;
      color: #e6e1d8;
    }

    header {
      position: sticky;
      top: 0;
      display: grid;
      grid-template-columns: auto auto auto auto auto 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: #191b1d;
      border-bottom: 1px solid #303236;
    }

    strong {
      font: 600 13px/1.2 system-ui, sans-serif;
      color: #f2c879;
    }

    input,
    button {
      height: 34px;
      box-sizing: border-box;
      border: 1px solid #41444a;
      background: #0c0d0e;
      color: #f3f0ea;
    }

    input {
      min-width: 120px;
      padding: 0 10px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    nav {
      grid-column: 1 / -1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }

    nav button {
      min-width: 84px;
    }

    nav button.active {
      border-color: #f2c879;
      color: #f2c879;
    }

    main {
      padding: 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: calc(1.45em - 3px);
    }

    .entry {
      position: relative;
      padding: 2px 10px 2px 92px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .entry::before {
      position: absolute;
      left: 10px;
      top: 2px;
      content: attr(data-tag);
      color: var(--tag-color, #cbbf9a);
      font-weight: 700;
    }

    .entry[data-log="server"] {
      background: #10161e;
      --tag-color: #7db1ff;
    }
    .entry[data-log="error"] {
      background: #1b1111;
      --tag-color: #ff8f8f;
    }
    .entry[data-log="playerbots"] {
      background: #111a16;
      --tag-color: #8ee0a1;
    }
    .entry[data-log="service"] {
      background: #17131f;
      --tag-color: #c88cff;
    }
    .entry[data-log="all"] {
      background: #131517;
      --tag-color: #f2c879;
    }
    .entry[data-log="system"] {
      background: #121418;
      --tag-color: #d4d8df;
    }

    .entry.error {
      --tag-color: #ff8f8f;
    }

    .entry[data-log="service"]::before {
      color: #dcabff;
    }
    .entry[data-log="server"]::before {
      color: #92c0ff;
    }
    .entry[data-log="error"]::before {
      color: #ffaaa9;
    }
    .entry[data-log="playerbots"]::before {
      color: #a6e8b4;
    }
    .entry[data-log="all"]::before {
      color: #ffe0a2;
    }
    .entry[data-log="system"]::before {
      color: #e1e5ea;
    }

    ::highlight(ansi-black) {
      color: #7f858b;
    }
    ::highlight(ansi-red) {
      color: #ff8d8d;
    }
    ::highlight(ansi-green) {
      color: #8ee0a1;
    }
    ::highlight(ansi-yellow) {
      color: #ffd98f;
    }
    ::highlight(ansi-blue) {
      color: #8cbcff;
    }
    ::highlight(ansi-magenta) {
      color: #d8a4ff;
    }
    ::highlight(ansi-cyan) {
      color: #85e0e6;
    }
    ::highlight(ansi-white) {
      color: #eef1f3;
    }
    ::highlight(ansi-bright-black) {
      color: #a5adb5;
    }
    ::highlight(ansi-bright-red) {
      color: #ffb3b3;
      font-weight: 600;
    }
    ::highlight(ansi-bright-green) {
      color: #b7f0c3;
      font-weight: 600;
    }
    ::highlight(ansi-bright-yellow) {
      color: #ffe7ad;
      font-weight: 600;
    }
    ::highlight(ansi-bright-blue) {
      color: #b8d2ff;
      font-weight: 600;
    }
    ::highlight(ansi-bright-magenta) {
      color: #e3c0ff;
      font-weight: 600;
    }
    ::highlight(ansi-bright-cyan) {
      color: #b9eff2;
      font-weight: 600;
    }
    ::highlight(ansi-bright-white) {
      color: #ffffff;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      header {
        grid-template-columns: 1fr auto auto;
      }

      strong,
      input {
        grid-column: 1 / -1;
      }
    }
    </style>
  </head>
  <body>
    <header>
      <strong id="path">Server logs</strong>
      <button id="status">Status</button>
      <button id="start">Start</button>
      <button id="stop">Stop</button>
      <button id="kill">Kill</button>
      <input id="query" placeholder="Search with rg">
      <button id="search">Search</button>
      <button id="live">Live</button>
      <button id="clear">Clear</button>
      <nav id="tabs">
        <button data-log="all">All</button>
        <button data-log="server">Server</button>
        <button data-log="error">Error</button>
        <button data-log="playerbots">Playerbots</button>
        <button data-log="service">Service</button>
      </nav>
    </header>
    <main id="output"></main>
    <script type="module">
    const api = 'https://19pvp.devazuka.com'
    const output = document.querySelector('#output')
    const query = document.querySelector('#query')
    const path = document.querySelector('#path')
    const tabs = document.querySelector('#tabs')
    const ansiHighlights = new Map()
    const supportsHighlights = Boolean(globalThis.CSS?.highlights && globalThis.Highlight && globalThis.Range)
    let source
    let currentLog = new URL(location.href).searchParams.get('log') || 'all'

    const clearAnsiHighlights = () => {
      if (!supportsHighlights) return
      for (const name of ansiHighlights.keys()) CSS.highlights.delete(name)
      ansiHighlights.clear()
    }

    const highlightName = (token) => `ansi-${token}`

    const ensureHighlight = (name) => {
      if (!supportsHighlights) return null
      let highlight = ansiHighlights.get(name)
      if (!highlight) {
        highlight = new Highlight()
        ansiHighlights.set(name, highlight)
        CSS.highlights.set(name, highlight)
      }
      return highlight
    }

    const ansiToken = (codes) => {
      const palette = {
        30: 'black',
        31: 'red',
        32: 'green',
        33: 'yellow',
        34: 'blue',
        35: 'magenta',
        36: 'cyan',
        37: 'white',
        90: 'bright-black',
        91: 'bright-red',
        92: 'bright-green',
        93: 'bright-yellow',
        94: 'bright-blue',
        95: 'bright-magenta',
        96: 'bright-cyan',
        97: 'bright-white',
      }
      for (const code of codes) {
        if (palette[code]) return palette[code]
      }
      return ''
    }

    const renderAnsi = (row, raw) => {
      const text = []
      const ranges = []
      const state = { bright: false, fg: '' }
      const ansi = /\x1b\[([0-9;]*)m/g
      let last = 0
      let plainLength = 0

      const currentHighlight = () => {
        if (!state.fg) return ''
        return state.bright ? `bright-${state.fg}` : state.fg
      }

      const pushSegment = (segment) => {
        if (!segment) return
        const start = plainLength
        text.push(segment)
        plainLength += segment.length
        const end = plainLength
        const name = currentHighlight()
        if (name) ranges.push({ start, end, name })
      }

      for (let match = ansi.exec(raw); match; match = ansi.exec(raw)) {
        pushSegment(raw.slice(last, match.index))

        const codes = match[1].split(';').filter(Boolean).map(Number)
        if (!codes.length) codes.push(0)

        for (const code of codes) {
          if (code === 0) {
            state.bright = false
            state.fg = ''
          } else if (code === 1) {
            state.bright = true
          } else if (code === 22) {
            state.bright = false
          } else if (code === 39) {
            state.fg = ''
            state.bright = false
          } else if (code >= 30 && code <= 37) {
            state.fg = ansiToken([code])
            state.bright = false
          } else if (code >= 90 && code <= 97) {
            state.fg = ansiToken([code - 60])
            state.bright = true
          } else {
            const token = ansiToken([code])
            if (token) state.fg = token
          }
        }

        last = match.index + match[0].length
      }

      pushSegment(raw.slice(last))

      const node = document.createTextNode(text.join(''))
      row.append(node)

      for (const { start, end, name } of ranges) {
        const highlight = ensureHighlight(highlightName(name))
        if (!highlight) continue
        const range = new Range()
        range.setStart(node, start)
        range.setEnd(node, end)
        highlight.add(range)
      }
    }

    const append = (line, className = '') => {
      const row = document.createElement('div')
      const tag = ['all', 'error', 'playerbots', 'server', 'service', 'system'].includes(className) ? className : 'system'
      row.className = `entry${tag ? ` ${tag}` : ''}`
      row.dataset.log = tag
      row.dataset.tag = tag
      renderAnsi(row, line)
      output.append(row)
      if (document.activeElement !== query) scrollTo(0, document.body.scrollHeight)
    }

    const accepts = (data) => currentLog === 'all' || data.file === currentLog || data.type !== 'log'

    const appendEvent = (data) => {
      if (data.error) {
        append(data.error, 'error')
        return
      }

      if (data.line) {
        append(data.line, data.file || 'system')
        return
      }

      if (data.message) {
        append(data.message, ['worldserver', 'api'].includes(data.type) ? 'system' : data.type || 'system')
        return
      }

      append(JSON.stringify(data), 'system')
    }

    const fetchTail = async () => {
      output.textContent = ''
      clearAnsiHighlights()
      const lines = await fetch(`${api}/logs/tail?log=${encodeURIComponent(currentLog)}`).then((res) => res.json())
      lines.forEach((line) => appendEvent(line))
    }

    const selectLog = (log) => {
      currentLog = log
      const url = new URL(location.href)
      log === 'all' ? url.searchParams.delete('log') : url.searchParams.set('log', log)
      history.replaceState(null, '', url)
      for (const button of tabs.querySelectorAll('button')) button.classList.toggle('active', button.dataset.log === log)
      fetchTail()
    }

    const live = () => {
      source?.close()
      source = new EventSource(`${api}/logs/events`)
      source.onmessage = (event) => {
        const data = JSON.parse(event.data)
        if (data.type === 'heartbeat' || !accepts(data)) return
        appendEvent(data)
      }
      source.onerror = () => {
        if (source?.readyState === EventSource.CLOSED) append('Log stream closed', 'error')
      }
    }

    document.querySelector('#search').onclick = async () => {
      source?.close()
      output.textContent = ''
      clearAnsiHighlights()
      const lines = await fetch(
        `${api}/logs/search?q=${encodeURIComponent(query.value)}&log=${encodeURIComponent(currentLog)}`,
      )
        .then((res) => res.json())
      lines.forEach((line) => append(line, 'system'))
    }

    const action = async (name) => {
      const method = name === 'status' ? 'GET' : 'POST'
      const result = await fetch(`${api}/worldserver/${name}`, { method }).then((res) => res.json())
      append(`${name}: ${JSON.stringify(result)}`)
    }

    document.querySelector('#live').onclick = live
    document.querySelector('#clear').onclick = () => {
      output.textContent = ''
      clearAnsiHighlights()
    }
    tabs.onclick = (event) => {
      const button = event.target.closest('button[data-log]')
      if (button) selectLog(button.dataset.log)
    }
    document.querySelector('#status').onclick = () => action('status')
    document.querySelector('#start').onclick = () => action('start')
    document.querySelector('#stop').onclick = () => action('stop')
    document.querySelector('#kill').onclick = () => action('kill')
    query.onkeydown = (event) => event.key === 'Enter' && document.querySelector('#search').click()

    fetch(`${api}/logs/info`)
      .then((res) => res.json())
      .then((info) => path.textContent = info.path || 'Server logs')
      .catch(() => path.textContent = 'Server logs')

    selectLog(currentLog)
    live()
    </script>
  </body>
</html>
