media:
  input: media
  output: /media
content:
  - name: config
    label: Configuration
    type: file
    path: config.json
    fields:
      - name: allowed_zones
        label: Allowed Zones ID
        type: code
        options:
          format: yml
        description: 'This the list of the ZoneID or AreaID, use .gps to find them ingame.'
  - name: worldserver
    label: WorldServer Config
    type: file
    path: config/worldserver.json
    fields:
      - name: RealmID
        label: Realm ID
        type: string
        description: >-
          Description: ID of the Realm using this config.

          Important:   RealmID must match the realmlist inside the auth
          database.

          Default:     1
        default: '1'
      - name: WorldServerPort
        label: World Server Port
        type: string
        description: |-
          Description: TCP port to reach the world server.
          Default:     8085
        default: '8085'
      - name: BindIP
        label: Bind IP
        type: string
        description: |-
          Description: Bind world server to IP/hostname
          Default:     "0.0.0.0" - (Bind to all IPs on the system)
        default: '"0.0.0.0"'
      - name: LoginDatabaseInfo
        label: Login Database Info
        type: string
        description: DATABASE & CONNECTIONS
        default: '"127.0.0.1;3306;acore;acore;acore_auth"'
      - name: WorldDatabaseInfo
        label: World Database Info
        type: string
        description: DATABASE & CONNECTIONS
        default: '"127.0.0.1;3306;acore;acore;acore_world"'
      - name: CharacterDatabaseInfo
        label: Character Database Info
        type: string
        description: >-
          Description: Database connection settings for the world server.

          Example:     "hostname;port;username;password;database"
                       ".;somenumber;username;password;database"
                       (Use named pipes on Windows "enable-named-pipe" to [mysqld] section my.ini)
                       ".;/path/to/unix_socket;username;password;database"
                       (Use Unix sockets on Unix/Linux)
          Default:     "127.0.0.1;3306;acore;acore;acore_auth"       -
          (LoginDatabaseInfo)
                       "127.0.0.1;3306;acore;acore;acore_world"      - (WorldDatabaseInfo)
                       "127.0.0.1;3306;acore;acore;acore_characters" - (CharacterDatabaseInfo)
        default: '"127.0.0.1;3306;acore;acore;acore_characters"'
      - name: LoginDatabase.WorkerThreads
        label: Login Database Worker Threads
        type: string
        description: DATABASE & CONNECTIONS
        default: '1'
      - name: WorldDatabase.WorkerThreads
        label: World Database Worker Threads
        type: string
        description: DATABASE & CONNECTIONS
        default: '1'
      - name: CharacterDatabase.WorkerThreads
        label: Character Database Worker Threads
        type: string
        description: >-
          Description: The amount of worker threads spawned to handle
          asynchronous (delayed) MySQL
                       statements. Each worker thread is mirrored with its own connection to the
                       MySQL server and their own thread on the MySQL server.
          Default:     1 - (LoginDatabase.WorkerThreads)
                       1 - (WorldDatabase.WorkerThreads)
                       1 - (CharacterDatabase.WorkerThreads)
        default: '1'
      - name: LoginDatabase.SynchThreads
        label: Login Database Synch Threads
        type: string
        description: DATABASE & CONNECTIONS
        default: '1'
      - name: WorldDatabase.SynchThreads
        label: World Database Synch Threads
        type: string
        description: DATABASE & CONNECTIONS
        default: '1'
      - name: CharacterDatabase.SynchThreads
        label: Character Database Synch Threads
        type: string
        description: |-
          Description: The amount of MySQL connections spawned to handle.
          Default:     1 - (LoginDatabase.SynchThreads)
                       1 - (WorldDatabase.SynchThreads)
                       1 - (CharacterDatabase.SynchThreads)
        default: '1'
      - name: MaxPingTime
        label: Max Ping Time
        type: string
        description: |-
          Description: Time (in minutes) between database pings.
          Default:     30
        default: '30'
      - name: Database.Reconnect.Seconds
        label: Database Reconnect Seconds
        type: string
        description: DATABASE & CONNECTIONS
        default: '15'
      - name: Database.Reconnect.Attempts
        label: Database Reconnect Attempts
        type: string
        description: |-
          Description: How many seconds between every reconnection attempt
                       and how many attempts will be performed in total
          Default:     20 attempts every 15 seconds
        default: '20'
      - name: DataDir
        label: Data Dir
        type: string
        description: >-
          Description: Data directory setting.

          Important:   DataDir needs to be quoted, as the string might contain
          space characters.

          Example:     "@prefix@\home\youruser\azerothcore\data"

          Default:     "."
        default: '"."'
      - name: LogsDir
        label: Logs Dir
        type: string
        description: >-
          Description: Logs directory setting.

          Important:   LogsDir needs to be quoted, as the string might contain
          space characters.
                       Logs directory must exists, or log file creation will be disabled.
          Example:     "/home/youruser/azerothcore/logs"

          Default:     "" - (Log files will be stored in the current path)
        default: '""'
      - name: TempDir
        label: Temp Dir
        type: string
        description: >-
          Description: Temp directory setting.

          Important:   TempDir needs to be quoted, as the string might contain
          space characters.
                       TempDir directory must exists, or the server can't work properly
          Example:     "/home/youruser/azerothcore/temp"

          Default:     "" - (Temp files will be stored in the current path)
        default: '""'
      - name: CMakeCommand
        label: CMake Command
        type: string
        description: |-
          Description: The path to your CMake binary.
                       If the path is left empty, the built-in CMAKE_COMMAND is used.
          Example:     "C:/Program Files/CMake/bin/cmake.exe"
                       "/usr/bin/cmake"
          Default:     ""
        default: '""'
      - name: BuildDirectory
        label: Build Directory
        type: string
        description: |-
          Description: The path to your build directory.
                       If the path is left empty, the built-in CMAKE_BINARY_DIR is used.
          Example:     "../AzerothCore"
          Default:     ""
        default: '""'
      - name: SourceDirectory
        label: Source Directory
        type: string
        description: |-
          Description: The path to your AzerothCore source directory.
                       If the path is left empty, the built-in CMAKE_SOURCE_DIR is used.
          Example:     "../azerothcore-wotlk"
          Default:     ""
        default: '""'
      - name: MySQLExecutable
        label: My SQLExecutable
        type: string
        description: |-
          Description: The path to your MySQL CLI binary.
                       If the path is left empty, built-in path from cmake is used.
          Example:     "C:/Program Files/MySQL/MySQL Server 8.0/bin/mysql.exe"
                       "mysql.exe"
                       "/usr/bin/mysql"
          Default:     ""
        default: '""'
      - name: PidFile
        label: Pid File
        type: string
        description: |-
          Description: World daemon PID file.
          Example:     "./world.pid" - (Enabled)
          Default:     ""            - (Disabled)
        default: '""'
      - name: Console.Enable
        label: Console Enable
        type: string
        description: |-
          Description: Enable console.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: BeepAtStart
        label: Beep At Start
        type: string
        description: >-
          Description: Beep when the world server finished starting (Unix/Linux
          systems).

          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: FlashAtStart
        label: Flash At Start
        type: string
        description: >-
          Description: Flashes in taskbar when the world server finished
          starting. (Works on Windows only)

          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Updates.EnableDatabases
        label: Updates Enable Databases
        type: string
        description: |-
          Description: A mask that describes which databases should be updated.
          Note:        Following flags are available
                       DATABASE_LOGIN     = 1, Auth database
                       DATABASE_CHARACTER = 2, Character database
                       DATABASE_WORLD     = 4, World database
          Default:     7 - (All enabled)
                       4 - (Enable world only)
                       0 - (All disabled)
        default: '7'
      - name: Updates.AutoSetup
        label: Updates Auto Setup
        type: string
        description: |-
          Description: Auto populate empty databases.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Updates.Redundancy
        label: Updates Redundancy
        type: string
        description: |-
          Description: Perform data redundancy checks through hashing
                       to detect changes on sql updates and reapply it.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Updates.ArchivedRedundancy
        label: Updates Archived Redundancy
        type: string
        description: |-
          Description: Check hashes of archived updates (slows down startup).
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Updates.AllowRehash
        label: Updates Allow Rehash
        type: string
        description: >-
          Description: Inserts the current file hash in the database if it is
          left empty.
                       Useful if you want to mark a file as applied but you don't know its hash.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Updates.CleanDeadRefMaxCount
        label: Updates Clean Dead Ref Max Count
        type: string
        description: >-
          Description: Cleans dead/ orphaned references that occur if an update
          was removed or renamed and edited in one step.
                       It only starts the clean up if the count of the missing updates is below or equal the Updates.CleanDeadRefMaxCount value.
                       This way prevents erasing of the update history due to wrong source directory state (maybe wrong branch or bad revision).
                       Disable this if you want to know if the database is in a possible "dirty state".
          Default:     3 - (Enabled)
                       0 - (Disabled)
                      -1 - (Enabled - unlimited)
        default: '3'
      - name: Updates.ExceptionShutdownDelay
        label: Updates Exception Shutdown Delay
        type: string
        description: >-
          Description: Time (in milliseconds) to wait before shutting down after
          a fatal exception (e.g. failed SQL update).

          Default:     10000 - 10 seconds
                       0     - Disabled (immediate shutdown)
        default: '10000'
      - name: Network.Threads
        label: Network Threads
        type: string
        description: |-
          Description: Number of threads for network.
           Default:    1 - (Recommended 1 thread per 1000 connections)
        default: '1'
      - name: Network.OutKBuff
        label: Network Out KBuff
        type: string
        description: >-
          Description: Amount of memory (in bytes) used for the output kernel
          buffer (see SO_SNDBUF
                       socket option, TCP manual).
          Default:     -1 - (Use system default setting)
        default: '-1'
      - name: Network.OutUBuff
        label: Network Out UBuff
        type: string
        description: >-
          Description: Amount of memory (in bytes) reserved initially in the
          user space per
                       connection for output buffering.
           Default:    4096
        default: '4096'
      - name: Network.TcpNodelay
        label: Network Tcp Nodelay
        type: string
        description: NETWORK
        default: '1'
      - name: Network.EnableProxyProtocol
        label: Network Enable Proxy Protocol
        type: string
        description: >-
          Description: Enables Proxy Protocol v2. When your server is behind a
          proxy,
                       load balancer, or similar component, you need to enable Proxy Protocol v2 on both
                       this server and the proxy/load balancer to track the real IP address of players.
          Example:     1 - (Enabled)

          Default:     0 - (Disabled)
        default: '0'
      - name: Network.UseSocketActivation
        label: Network Use Socket Activation
        type: string
        description: >-
          Description: [LINUX ONLY FEATURE] Enable systemd socket activation
          support for the worldserver.
                       When enabled and the process is started by systemd socket activation,
                       the server will use the socket passed by systemd instead of
                       creating and binding its own listening socket. Disabled by default.
                       When enabled the realm is not automatically set as offline on shutdown.
          Example:     1 - (Enabled)

          Default:     0 - (Disabled)
        default: '0'
      - name: Ra.Enable
        label: Ra Enable
        type: string
        description: |-
          Description: Enable remote console (telnet).
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Ra.IP
        label: Ra IP
        type: string
        description: |-
          Description: Bind remote access to IP/hostname.
          Default:     "0.0.0.0" - (Bind to all IPs on the system)
        default: '"0.0.0.0"'
      - name: Ra.Port
        label: Ra Port
        type: string
        description: |-
          Description: TCP port to reach the remote console.
          Default:     3443
        default: '3443'
      - name: Ra.MinLevel
        label: Ra Min Level
        type: string
        description: |-
          Description: Required security level to use the remote console.
          Default:     3
        default: '3'
      - name: SOAP.Enabled
        label: SOAP Enabled
        type: string
        description: REMOTE ACCESS
        default: '0'
      - name: SOAP.IP
        label: SOAP IP
        type: string
        description: |-
          Description: Bind SOAP service to IP/hostname
          Default:     "127.0.0.1" - (Bind to localhost)
        default: '"127.0.0.1"'
      - name: SOAP.Port
        label: SOAP Port
        type: string
        description: |-
          Description: TCP port to reach the SOAP service.
          Default:     7878
        default: '7878'
      - name: TOTPMasterSecret
        label: TOTPMaster Secret
        type: string
        description: >-
          Description: The key used by authserver to decrypt TOTP secrets from
          database storage.
                       You only need to set this here if you plan to use the in-game 2FA
                       management commands (.account 2fa), otherwise this can be left blank.
                       The server will auto-detect if this does not match your authserver setting,
                       in which case any commands reliant on the secret will be disabled.
          Default:     <blank>
        default: ''
      - name: ThreadPool
        label: Thread Pool
        type: string
        description: |-
          Description: Number of threads to be used for the global thread pool
                       The thread pool is currently used for:
                       - Signal handling
                       - Remote access
                       - Database keep-alive ping
                       - Core freeze check
                       - World socket networking
          Default:     2
        default: '2'
      - name: UseProcessors
        label: Use Processors
        type: string
        description: >-
          Description: Processors mask for Windows and Linux based
          multi-processor systems.

          Example:     For a computer with 3 CPUs:
                       1  - 1st CPU only
                       2  - 2nd CPU only
                       4  - 3rd CPU only
                       6  - 2nd + 3rd CPUs, because "2 | 4" -> 6
          Default:     0  - (Selected by OS)
                       1+ - (Bit mask value of selected processors)
        default: '0'
      - name: ProcessPriority
        label: Process Priority
        type: string
        description: |-
          Description: Process priority setting for Windows based systems.
          Default:     1 - (High)
                       0 - (Normal)
        default: '1'
      - name: Compression
        label: Compression
        type: string
        description: |-
          Description: Compression level for client update packages
          Range:       1-9
          Default:     1 - (Speed)
                       9 - (Best compression)
        default: '1'
      - name: PacketLogFile
        label: Packet Log File
        type: string
        description: |-
          Description: Binary packet logging file for the world server.
                       Filename extension must be .pkt to be parsable with WowPacketParser.
          Example:     "World.pkt" - (Enabled)
          Default:     ""          - (Disabled)
        default: '""'
      - name: LogDB.Opt.ClearInterval
        label: Log DB Opt Clear Interval
        type: string
        description: >-
          Description: Time (in minutes) for the WUPDATE_CLEANDB timer that
          clears the `logs` table
                       of old entries.
          Default:     10 - (10 minutes)
                       1+
        default: '10'
      - name: LogDB.Opt.ClearTime
        label: Log DB Opt Clear Time
        type: string
        description: |-
          Description: Time (in seconds) for keeping old `logs` table entries.
          Default:     1209600 - (Enabled, 14 days)
                       0       - (Disabled, Do not clear entries)
        default: '1209600'
      - name: RecordUpdateTimeDiffInterval
        label: Record Update Time Diff Interval
        type: string
        description: >-
          Description: Time (in milliseconds) update time diff is written to the
          log file.
                       Update diff can be used as a performance indicator. Diff < 300: good
                       performance. Diff > 600 bad performance, may be caused by high CPU usage.
          Default:     300000 - (Enabled, 5 minutes)
                       0      - (Disabled)
        default: '300000'
      - name: MinRecordUpdateTimeDiff
        label: Min Record Update Time Diff
        type: string
        description: LOGGING
        default: '100'
      - name: IPLocationFile
        label: IPLocation File
        type: string
        description: |-
          Description: The path to your IP2Location database CSV file.
          Example:     "C:/acore/IP2LOCATION-LITE-DB1.CSV"
                       "/home/acore/IP2LOCATION-LITE-DB1.CSV"
          Default:     "" - (Disabled)
        default: '""'
      - name: AllowLoggingIPAddressesInDatabase
        label: Allow Logging IPAddresses In Database
        type: string
        description: |-
          Description: Specifies if IP addresses can be logged to the database
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Allow.IP.Based.Action.Logging
        label: Allow IP Based Action Logging
        type: string
        description: >-
          Description: Logs actions, e.g. account login and logout to name a
          few, based on IP of current session.

          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: LogSpamReports
        label: Log Spam Reports
        type: string
        description: >-
          Description: Allow logging spam reports from players in the chat, mail
          or calendar into the database.

          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: ChatLog.Enable
        label: Chat Log Enable
        type: string
        description: |-
          Description: Enable or disable chat logging (chat_log.cpp).
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Appender.Console
        label: Appender Console
        type: string
        description: LOGGING
        default: '1,4,0,"1 9 3 6 5 8"'
      - name: Appender.Server
        label: Appender Server
        type: string
        description: LOGGING
        default: '2,5,0,Server.log,w'
      - name: Appender.Playerbots
        label: Appender Playerbots
        type: string
        description: LOGGING
        default: '2,5,0,Playerbots.log,w'
      - name: Appender.Errors
        label: Appender Errors
        type: string
        description: 'Appender.GM=2,5,15,gm_%s.log'
        default: '2,2,0,Errors.log,w'
      - name: Logger.root
        label: Logger Root
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '2,Console Server'
      - name: Logger.diff
        label: Logger Diff
        type: string
        description: |-
          Logger.metric=2,Console Server
          Logger.commands.gm=4,Console GM
        default: '3,Console Server'
      - name: Logger.mmaps
        label: Logger Mmaps
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Server'
      - name: Logger.scripts.hotswap
        label: Logger Scripts Hotswap
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Console Server'
      - name: Logger.server
        label: Logger Server
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Console Server'
      - name: Logger.sql.sql
        label: Logger Sql Sql
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '2,Console Errors'
      - name: Logger.sql.updates
        label: Logger Sql Updates
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Console Server Errors'
      - name: Logger.sql
        label: Logger Sql
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Console Server'
      - name: Logger.time.update
        label: Logger Time Update
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Console Server'
      - name: Logger.module
        label: Logger Module
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '4,Console Server'
      - name: Logger.spells.scripts
        label: Logger Spells Scripts
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '2,Console Errors'
      - name: Logger.playerbots
        label: Logger Playerbots
        type: string
        description: 'Appender.Dev=2,5,0,Dev.log,a'
        default: '5,Console Playerbots'
      - name: Log.Async.Enable
        label: Log Async Enable
        type: string
        description: |-
          Description: Enables asynchronous message logging.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Metric.Enable
        label: Metric Enable
        type: string
        description: |-
          Description: Enables statistics sent to the metric database.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Metric.InfluxDB.Connection
        label: Metric Influx DB Connection
        type: string
        description: >-
          These settings control the statistics sent to the metric database
          (currently InfluxDB)
        default: '"127.0.0.1;8086;worldserver"'
      - name: Metric.InfluxDB.v2
        label: Metric Influx DB V2
        type: string
        description: >-
          These settings control the statistics sent to the metric database
          (currently InfluxDB)
        default: '0'
      - name: Metric.InfluxDB.Org
        label: Metric Influx DB Org
        type: string
        description: >-
          These settings control the statistics sent to the metric database
          (currently InfluxDB)
        default: '""'
      - name: Metric.InfluxDB.Bucket
        label: Metric Influx DB Bucket
        type: string
        description: >-
          These settings control the statistics sent to the metric database
          (currently InfluxDB)
        default: '""'
      - name: Metric.InfluxDB.Token
        label: Metric Influx DB Token
        type: string
        description: >-
          These settings control the statistics sent to the metric database
          (currently InfluxDB)
        default: '""'
      - name: Metric.Interval
        label: Metric Interval
        type: string
        description: |-
          Description: Interval between every batch of data sent in seconds.
                       Longer interval means larger batch of data. If the batch
                       is too big, it might get rejected.
          Default:     1 second
        default: '1'
      - name: Metric.OverallStatusInterval
        label: Metric Overall Status Interval
        type: string
        description: >-
          Description: Interval between every gathering of overall worldserver
          status data in seconds

          Default:     1 second
        default: '1'
      - name: BirthdayTime
        label: Birthday Time
        type: string
        description: >-
          Description: Set to date of project's birth in UNIX time. By default
          Thu Oct 2, 2008

          Default:     1222964635
        default: '1222964635'
      - name: PlayerLimit
        label: Player Limit
        type: string
        description: >-
          Description: Maximum number of players in the world. Excluding Mods,
          GMs and Admins.

          Important:   If you want to block players and only allow Mods, GMs or
          Admins to join the
                       server, use the DB field "auth.realmlist.allowedSecurityLevel".
          Default:     1000 - (Enabled)
                       1+   - (Enabled)
                       0    - (Disabled, No limit)
        default: '1000'
      - name: World.RealmAvailability
        label: World Realm Availability
        type: string
        description: |-
          Description: If enabled, players will enter the realm normally.
                       Character creation will still be possible even when realm is disabled.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: GameType
        label: Game Type
        type: string
        description: |-
          Description: Server realm type.
          Default:     0  - (NORMAL)
                       1  - (PVP)
                       4  - (NORMAL)
                       6  - (RP)
                       8  - (RPPVP)
                       16 - (FFA_PVP, Free for all PvP mode like arena PvP in all zones except rest
                            activated places and sanctuaries)
        default: '0'
      - name: RealmZone
        label: Realm Zone
        type: string
        description: >-
          Description: Server realm zone. Set allowed alphabet in character,
          etc. names.

          Default:     1  - (Development   - any language)
                       2  - (United States - extended-Latin)
                       3  - (Oceanic       - extended-Latin)
                       4  - (Latin America - extended-Latin)
                       5  - (Tournament    - basic-Latin at create, any at login)
                       6  - (Korea         - East-Asian)
                       7  - (Tournament    - basic-Latin at create, any at login)
                       8  - (English       - extended-Latin)
                       9  - (German        - extended-Latin)
                       10 - (French        - extended-Latin)
                       11 - (Spanish       - extended-Latin)
                       12 - (Russian       - Cyrillic)
                       13 - (Tournament    - basic-Latin at create, any at login)
                       14 - (Taiwan        - East-Asian)
                       15 - (Tournament    - basic-Latin at create, any at login)
                       16 - (China         - East-Asian)
                       17 - (CN1           - basic-Latin at create, any at login)
                       18 - (CN2           - basic-Latin at create, any at login)
                       19 - (CN3           - basic-Latin at create, any at login)
                       20 - (CN4           - basic-Latin at create, any at login)
                       21 - (CN5           - basic-Latin at create, any at login)
                       22 - (CN6           - basic-Latin at create, any at login)
                       23 - (CN7           - basic-Latin at create, any at login)
                       24 - (CN8           - basic-Latin at create, any at login)
                       25 - (Tournament    - basic-Latin at create, any at login)
                       26 - (Test Server   - any language)
                       27 - (Tournament    - basic-Latin at create, any at login)
                       28 - (QA Server     - any language)
                       29 - (CN9           - basic-Latin at create, any at login)
        default: '1'
      - name: DBC.Locale
        label: DBC Locale
        type: string
        description: |-
          Description: DBC language settings.
          Default:     255 - (Auto Detect)
                       0   - (English)
                       1   - (Korean)
                       2   - (French)
                       3   - (German)
                       4   - (Chinese)
                       5   - (Taiwanese)
                       6   - (Spanish)
                       7   - (Spanish Mexico)
                       8   - (Russian)
        default: '255'
      - name: Expansion
        label: Expansion
        type: string
        description: >-
          Description: Allow server to use content from expansions. Checks for
          expansion-related
                       map files, client compatibility and class/race character creation.
          Default:     2 - (Expansion 2)
                       1 - (Expansion 1)
                       0 - (Disabled, Ignore and disable expansion content (maps, races, classes)
        default: '2'
      - name: ClientCacheVersion
        label: Client Cache Version
        type: string
        description: >-
          Description: Client cache version for client cache data reset. Use any
          value different
                       from DB and not recently been used to trigger client side cache reset.
          Default:     0 - (Use DB value from world DB version.cache_id field)
        default: '0'
      - name: SessionAddDelay
        label: Session Add Delay
        type: string
        description: >-
          Description: Time (in microseconds) that a network thread will sleep
          after authentication
                       protocol handling before adding a connection to the world session map.
          Default:     10000 - (10 milliseconds, 0.01 second)
        default: '10000'
      - name: CloseIdleConnections
        label: Close Idle Connections
        type: string
        description: |-
          Description: Automatically close idle connections.
                       SocketTimeOutTime and SocketTimeOutTimeActive determine when a connection is considered as idle.
          Default:     1 - (enable, Automatically close idle connections)
                       0 - (disable, Do not close idle connections)
        default: '1'
      - name: SocketTimeOutTime
        label: Socket Time Out Time
        type: string
        description: >-
          Description: Time (in milliseconds) after which a connection being
          idle on the character
                       selection screen is disconnected.
          Default:     900000 - (15 minutes)
        default: '900000'
      - name: SocketTimeOutTimeActive
        label: Socket Time Out Time Active
        type: string
        description: >-
          Description: Time (in milliseconds) after which an idle connection is
          dropped while
                       logged into the world.
                       The client sends keepalive packets every 30 seconds. Values <= 30s are not recommended.
          Default:     60000 - (1 minute)
        default: '60000'
      - name: MaxOverspeedPings
        label: Max Overspeed Pings
        type: string
        description: >-
          Description: Maximum overspeed ping count before character is
          disconnected.

          Default:     2  - (Enabled, Minimum value)
                       3+ - (Enabled, More checks before kick)
                       0  - (Disabled)
        default: '2'
      - name: DisconnectToleranceInterval
        label: Disconnect Tolerance Interval
        type: string
        description: >-
          Description: Allows to skip queue after being disconnected for a given
          number of seconds.

          Default:     0
        default: '0'
      - name: EnableLoginAfterDC
        label: Enable Login After DC
        type: string
        description: >-
          Description: After not logging out properly (clicking Logout and
          waiting 20 seconds),
                       characters stay in game world for a full minute, even if the client connection was closed.
                       Such behaviour prevents for example exploiting boss encounters by alt+f4
                       and skipping crucial boss abilities, or escaping opponents in PvP.
                       This setting is used to allow/disallow players to log back into characters that are left in world.
          Default:     1 - (by clicking "Enter World" player will log back into
          a character that is already in world)
                       0 - (by clicking "Enter World" player will get an error message when trying to log into a character
                           that is left in world, and has to wait a minute for the character to be removed from world)
        default: '1'
      - name: MinWorldUpdateTime
        label: Min World Update Time
        type: string
        description: >-
          Description: Minimum time (milliseconds) between world update ticks
          (for mostly idle servers).

          Default:     1 - (0.001 second)
        default: '1'
      - name: UpdateUptimeInterval
        label: Update Uptime Interval
        type: string
        description: |-
          Description: Update realm uptime period (in minutes).
          Default:     10 - (10 minutes)
                       1+
        default: '10'
      - name: MaxCoreStuckTime
        label: Max Core Stuck Time
        type: string
        description: >-
          Description: Time (in seconds) before the server is forced to crash if
          it is frozen.
                       FreezeDetector
          Default:     0   - (Disabled)
                       10+ - (Enabled, Recommended 30+)
          Note:        If enabled and the setting is too low, it can cause
          unexpected crash.
        default: '0'
      - name: SaveRespawnTimeImmediately
        label: Save Respawn Time Immediately
        type: string
        description: >-
          Description: Save respawn time for creatures at death and gameobjects
          at use/open.

          Default:     1 - (Enabled, Save respawn time immediately)
                       0 - (Disabled, Save respawn time at grid unloading)
        default: '1'
      - name: Server.LoginInfo
        label: Server Login Info
        type: string
        description: |-
          Description: Display core version (.server info) on login.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: ShowKickInWorld
        label: Show Kick In World
        type: string
        description: >-
          Description: Determines whether a message is broadcast to the entire
          server when a
                       player gets kicked
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: ShowMuteInWorld
        label: Show Mute In World
        type: string
        description: >-
          Description: Determines whether a message is broadcast to the entire
          server when a
                       player gets muted.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: ShowBanInWorld
        label: Show Ban In World
        type: string
        description: >-
          Description: Determines whether a message is broadcast to the entire
          server when a
                       player gets banned.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: MaxWhoListReturns
        label: Max Who List Returns
        type: string
        description: >-
          Description: Set the max number of players returned in the /who list
          and interface.

          Default:     49 - (stable)
        default: '49'
      - name: PreventAFKLogout
        label: Prevent AFKLogout
        type: string
        description: |-
          Description: Prevent players AFK from being logged out
          Default:     0 - (Disabled)
                       1 - (Enabled, prevent players AFK from being logged out in Sanctuary zones)
                       2 - (Enabled, prevent players AFK from being logged out in all zones)
        default: '0'
      - name: PacketSpoof.BanMode
        label: Packet Spoof Ban Mode
        type: string
        description: >-
          Description: If PacketSpoof.Policy equals 2, this will determine the
          ban mode.

          Values:      0 - Ban Account
                       1 - Ban IP
          Note:        Banning by character not supported for logical reasons.
        default: '0'
      - name: PacketSpoof.BanDuration
        label: Packet Spoof Ban Duration
        type: string
        description: >-
          Description: Duration of the ban in seconds. Only valid if
          PacketSpoof.Policy is set to 2.
                       Set to 0 for permanent ban.
          Default:     86400 seconds (1 day)
        default: '86400'
      - name: Warden.Enabled
        label: Warden Enabled
        type: string
        description: |-
          Description: Enable Warden anti-cheat system.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Warden.NumMemChecks
        label: Warden Num Mem Checks
        type: string
        description: >-
          Description: Number of Warden memory checks that are sent to the
          client each cycle.

          Default:     3 - (Enabled)
                       0 - (Disabled)
        default: '3'
      - name: Warden.NumLuaChecks
        label: Warden Num Lua Checks
        type: string
        description: >-
          Description: Number of Warden LUA checks that are sent to the client
          each cycle.

          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Warden.NumOtherChecks
        label: Warden Num Other Checks
        type: string
        description: >-
          Description: Number of Warden checks other than memory checks that are
          added to request
                       each checking cycle.
          Default:     7 - (Enabled)
                       0 - (Disabled)
        default: '7'
      - name: Warden.ClientResponseDelay
        label: Warden Client Response Delay
        type: string
        description: >-
          Description: Time (in seconds) before client is getting disconnecting
          for not responding.

          Default:     600 - (10 Minutes)
                       0 - (Disabled, client won't be kicked)
        default: '600'
      - name: Warden.ClientCheckHoldOff
        label: Warden Client Check Hold Off
        type: string
        description: >-
          Description: Time (in seconds) to wait before sending the next check
          request to the client.
                       A low number increases traffic and load on client and server side.
          Default:     30 - (30 Seconds)
                       0  - (Send check as soon as possible)
        default: '30'
      - name: Warden.ClientCheckFailAction
        label: Warden Client Check Fail Action
        type: string
        description: >-
          Description: Default action being taken if a client check failed.
          Actions can be
                       overwritten for each single check via warden_action table in characters
                       database.
          Default:     0 - (Disabled, Logging only)
                       1 - (Kick)
                       2 - (Ban)
        default: '0'
      - name: Warden.BanDuration
        label: Warden Ban Duration
        type: string
        description: >-
          Description: Time (in seconds) an account will be banned if
          ClientCheckFailAction is set
                       to ban.
          Default:     86400 - (24 hours)
                       0     - (Permanent ban)
        default: '86400'
      - name: AutoBroadcast.On
        label: Auto Broadcast On
        type: string
        description: |-
          Description: Enable auto broadcast.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: AutoBroadcast.Center
        label: Auto Broadcast Center
        type: string
        description: |-
          Description: Auto broadcasting display method.
          Default:     0 - (Announce)
                       1 - (Notify)
                       2 - (Both)
        default: '0'
      - name: AutoBroadcast.Timer
        label: Auto Broadcast Timer
        type: string
        description: |-
          Description: Timer (in milliseconds) for auto broadcasts.
          Default:     60000 - (60 seconds)
        default: '60000'
      - name: AutoBroadcast.MinDisableLevel
        label: Auto Broadcast Min Disable Level
        type: string
        description: >-
          Description: Minimum level required to disable autobroadcast
          announcements if EnablePlayerSettings option is enabled.

          Default:     0 - (Not allowed to disable it)
        default: '0'
      - name: Visibility.GroupMode
        label: Visibility Group Mode
        type: string
        description: >-
          Description: Group visibility modes. Defines which groups can aways
          detect invisible
                       characters of the same raid, group or faction.
          Default:     1 - (Raid)
                       0 - (Party)
                       2 - (Faction)
        default: '1'
      - name: Visibility.Distance.Continents
        label: Visibility Distance Continents
        type: string
        description: VISIBILITY AND DISTANCES
        default: '100'
      - name: Visibility.Distance.Instances
        label: Visibility Distance Instances
        type: string
        description: VISIBILITY AND DISTANCES
        default: '170'
      - name: Visibility.Distance.BGArenas
        label: Visibility Distance BGArenas
        type: string
        description: |-
          Description: Visibility distance to see other players or gameobjects.
                       Visibility on continents on retail ~100 yards. In BG/Arenas ~250.
                       For instances default ~170.
                       Max: 250
                       Min limit is max aggro radius (45) * Rate.Creature.Aggro
          Default:     100 - (Visibility.Distance.Continents)
                       170 - (Visibility.Distance.Instances)
                       250 - (Visibility.Distance.BGArenas)
        default: '250'
      - name: Visibility.ObjectSparkles
        label: Visibility Object Sparkles
        type: string
        description: >-
          Description: Whether or not to display sparkles on gameobjects related
          to active quests.

          Default:     1 - (Show Sparkles)
                       0 - (Hide Sparkles)
        default: '1'
      - name: Visibility.ObjectQuestMarkers
        label: Visibility Object Quest Markers
        type: string
        description: >-
          Description: Show quest icons above game objects in the same way as
          creature quest givers.

          Default:     1 - (Show quest markers, post patch 2.3 behavior)
                       0 - (Hide quest markers, pre patch 2.3 behavior)
        default: '1'
      - name: MapUpdateInterval
        label: Map Update Interval
        type: string
        description: |-
          Description: Time (milliseconds) for map update interval.
          Default:     10 - (0.01 second)
        default: '10'
      - name: MapUpdate.Threads
        label: Map Update Threads
        type: string
        description: |-
          Description: Number of threads to update maps.
          Default:     1
        default: '1'
      - name: MoveMaps.Enable
        label: Move Maps Enable
        type: string
        description: |-
          Description: Enable/Disable pathfinding using mmaps - recommended.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '1'
      - name: vmap.enableLOS
        label: Vmap Enable LOS
        type: string
        description: MAPS
        default: '1'
      - name: vmap.enableHeight
        label: Vmap Enable Height
        type: string
        description: |-
          Description: VMmap support for line of sight and height calculation.
          Default:     1 - (Enabled, vmap.enableLOS)
                       1 - (Enabled, vmap.enableHeight)
                       0 - (Disabled)
        default: '1'
      - name: vmap.petLOS
        label: Vmap Pet LOS
        type: string
        description: >-
          Description: Check line of sight for pets, to avoid them attacking
          through walls.

          Default:     1 - (Enabled, each pet attack will be checked for line of
          sight)
                       0 - (Disabled, somewhat less CPU usage)
        default: '1'
      - name: vmap.BlizzlikePvPLOS
        label: Vmap Blizzlike Pv PLOS
        type: string
        description: >-
          Description: Check line of sight for battleground and arena
          gameobjects and other doodads (such as WSG treestumps).

          Default:     1 - (Enabled, players will be able to fire spells through
          treestumps and other objects).
                       0 - (Disabled, players will NOT be able to fire spells through treestumps and other objects).
        default: '1'
      - name: vmap.BlizzlikeLOSInOpenWorld
        label: Vmap Blizzlike LOSIn Open World
        type: string
        description: MAPS
        default: '1'
      - name: vmap.enableIndoorCheck
        label: Vmap Enable Indoor Check
        type: string
        description: >-
          Description: VMap based indoor check to remove outdoor-only auras
          (mounts etc.).

          Default:     1 - (Enabled)
                       0 - (Disabled, somewhat less CPU usage)
        default: '1'
      - name: DetectPosCollision
        label: Detect Pos Collision
        type: string
        description: >-
          Description: Check final move position, summon position, etc for
          visible collision with
                       other objects or walls (walls only if vmaps are enabled).
          Default:     1 - (Enabled)
                       0 - (Disabled, Less position precision but less CPU usage)
        default: '1'
      - name: CheckGameObjectLoS
        label: Check Game Object Lo S
        type: string
        description: >-
          Description: Include dynamic game objects (doors, chests etc.) in line
          of sight checks.
                       This increases CPU usage somewhat.
          Default:     1 - (Enabled)
                       0 - (Disabled, may break some boss encounters)
        default: '1'
      - name: PreloadAllNonInstancedMapGrids
        label: Preload All Non Instanced Map Grids
        type: string
        description: >-
          Description: Preload all grids on all non-instanced maps. This will
          take a great amount
                       of additional RAM (ca. 9 GB) and causes the server to take longer to start,
                       but can increase performance if used on a server with a high amount of players.
                       It will also activate all creatures which are set active (e.g. the Fel Reavers
                       in Hellfire Peninsula) on server start.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: DontCacheRandomMovementPaths
        label: Dont Cache Random Movement Paths
        type: string
        description: MAPS
        default: '0'
      - name: ActivateWeather
        label: Activate Weather
        type: string
        description: |-
          Description: Activate the weather system.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: ChangeWeatherInterval
        label: Change Weather Interval
        type: string
        description: |-
          Description: Time (in milliseconds) for weather update interval.
          Default:     600000 - (10 min)
        default: '600000'
      - name: AllowTickets
        label: Allow Tickets
        type: string
        description: |-
          Description: Allow/disallow sending new tickets.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: LevelReq.Ticket
        label: Level Req Ticket
        type: string
        description: TICKETS
        default: '1'
      - name: DeletedCharacterTicketTrace
        label: Deleted Character Ticket Trace
        type: string
        description: |-
          Description: Keep trace of tickets opened by deleted characters
                       gm_ticket.playerGuid will be 0, old GUID and character name
                       will be included in gm_ticket.comment
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: AllowPlayerCommands
        label: Allow Player Commands
        type: string
        description: |-
          Description: Allow players to use commands.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Command.LookupMaxResults
        label: Command Lookup Max Results
        type: string
        description: >-
          Description: Number of results being displayed using a .lookup
          command.

          Default:     0 - (Unlimited)
        default: '0'
      - name: Die.Command.Mode
        label: Die Command Mode
        type: string
        description: |-
          Description: Do not trigger things like loot from .die command.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: GM.LoginState
        label: GM Login State
        type: string
        description: |-
          Description: GM mode at login.
          Default:     2 - (Last save state)
                       0 - (Disable)
                       1 - (Enable)
        default: '2'
      - name: GM.Visible
        label: GM Visible
        type: string
        description: |-
          Description: GM visibility at login.
          Default:     2 - (Last save state)
                       0 - (Invisible)
                       1 - (Visible)
        default: '2'
      - name: GM.Chat
        label: GM Chat
        type: string
        description: |-
          Description: GM chat mode at login.
          Default:     2 - (Last save state)
                       0 - (Disable)
                       1 - (Enable)
        default: '2'
      - name: GM.WhisperingTo
        label: GM Whispering To
        type: string
        description: |-
          Description: Is GM accepting whispers from player by default or not.
          Default:     2 - (Last save state)
                       0 - (Disable)
                       1 - (Enable)
        default: '2'
      - name: GM.InGMList.Level
        label: GM In GMList Level
        type: string
        description: >-
          Description: Maximum GM level shown in GM list (if enabled) in non-GM
          state (.gm off).

          Default:     3 - (Anyone)
                       0 - (Only players)
                       1 - (Only moderators)
                       2 - (Only gamemasters)
        default: '3'
      - name: GM.InWhoList.Level
        label: GM In Who List Level
        type: string
        description: |-
          Description: Max GM level showed in who list (if visible).
          Default:     3 - (Anyone)
                       0 - (Only players)
                       1 - (Only moderators)
                       2 - (Only gamemasters)
        default: '3'
      - name: GM.StartLevel
        label: GM Start Level
        type: string
        description: |-
          Description: GM character starting level.
          Default:     1
        default: '1'
      - name: GM.AllowInvite
        label: GM Allow Invite
        type: string
        description: |-
          Description: Allow players to invite GM characters.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: GM.AllowFriend
        label: GM Allow Friend
        type: string
        description: |-
          Description: Allow players to add GM characters to their friends list.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: GM.LowerSecurity
        label: GM Lower Security
        type: string
        description: >-
          Description: Allow lower security levels to use commands on higher
          security level
                       characters.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: GM.TicketSystem.ChanceOfGMSurvey
        label: GM Ticket System Chance Of GMSurvey
        type: string
        description: |-
          Description: Chance of sending a GM survey after ticket completion.
          Default:     50 - (Enabled)
                       0  - (Disabled)
        default: '50'
      - name: DisableWaterBreath
        label: Disable Water Breath
        type: string
        description: |-
          Description: Required security level for water breathing.
          Default:     4 - (Disabled)
                       0 - (Enabled, Everyone)
                       1 - (Enabled, Mods/GMs/Admins)
                       2 - (Enabled, GMs/Admins)
                       3 - (Enabled, Admins)
        default: '4'
      - name: AllFlightPaths
        label: All Flight Paths
        type: string
        description: >-
          Description: Character knows all flight paths (of both factions) after
          creation.

          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: InstantFlightPaths
        label: Instant Flight Paths
        type: string
        description: >-
          Description: Flight paths will take players to their destination
          instantly instead
                       of making them wait while flying.
          Default:     0 - (Disabled)
                       1 - (Enabled)
                       2 - (Enabled, but the player can toggle instant flight off or on at each flight master)
        default: '0'
      - name: AlwaysMaxSkillForLevel
        label: Always Max Skill For Level
        type: string
        description: >-
          Description: Players will automatically gain max skill level when
          logging in or leveling
                       up.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: AlwaysMaxWeaponSkill
        label: Always Max Weapon Skill
        type: string
        description: >-
          Description: Players will automatically gain max weapon/defense skill
          when logging in,
                       or leveling.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: PlayerStart.AllReputation
        label: Player Start All Reputation
        type: string
        description: >-
          Description: Players will start with most of the high level
          reputations that are needed
                       for items, mounts etc.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: PlayerStart.CustomSpells
        label: Player Start Custom Spells
        type: string
        description: >-
          Description: If enabled, players will start with custom spells defined
          in
                       playercreateinfo_spell_custom table.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: PlayerStart.MapsExplored
        label: Player Start Maps Explored
        type: string
        description: |-
          Description: Characters start with all maps explored.
          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: InstantLogout
        label: Instant Logout
        type: string
        description: >-
          Description: Required security level for instantly logging out
          everywhere.
                       Does not work while in combat, dueling or falling.
          Default:     1  - (Enabled, Mods/GMs/Admins)
                       0  - (Enabled, Everyone)
                       2  - (Enabled, GMs/Admins)
                       3  - (Enabled, Admins)
                       4  - (Disabled)
        default: '1'
      - name: Trial.LevelCap
        label: Trial Level Cap
        type: string
        description: >-
          Description: Maximum level a trial account can reach. XP gain stops
          once this level is reached.

          Default:     20
                       0  - (Disabled, no cap)
        default: '20'
      - name: Trial.MoneyCap
        label: Trial Money Cap
        type: string
        description: |-
          Description: Maximum money a trial account can hold, in copper.
          Default:     100000 - (10 gold)
                       0      - (Disabled, no cap)
        default: '100000'
      - name: Trial.TradeSkillCap
        label: Trial Trade Skill Cap
        type: string
        description: >-
          Description: Maximum value any profession skill can reach on a trial
          account.

          Default:     100
                       0   - (Disabled, no cap)
        default: '100'
      - name: Trial.Restriction.Chat
        label: Trial Restriction Chat
        type: string
        description: >-
          Description: Restrict trial accounts from using whisper/channel/guild
          chats.
                       Whispers are only allowed when the trial player is on the recipients friendslist
                       or when the trial account was messaged first.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Trial.Restriction.Mail
        label: Trial Restriction Mail
        type: string
        description: |-
          Description: Restrict trial accounts from sending mail.
          Default:     1 - (Enabled)
                       0 - (Disabled)
        default: '1'
      - name: Trial.Restriction.Trade
        label: Trial Restriction Trade
        type: string
        description: >-
          Description: Restrict trial accounts from initiating or being the
