        type: string
        description: >-
          A list of GameObject GUIDs that bots will not interact with.

          List of default GUIDs:

          QuestItems:

          Blood of Heroes = 176213, Defias Gunpowder = 17155, Waterlogged
          Envelope = 2656, Baelog's Chest = 123329, Half-Buried Bottle = 2560

          Chests:

          Large Solid Chest = 74448, Box of Assorted Parts = 19020, Food Crate =
          3719, Water Barrel = 3658, Barrel of Milk = 3705, Barrel of sweet
          Nectar = 3706, Tattered Chest = 105579, Large bettered Chest = 75293,
          Solid Chest = 2857, Battered Foodlocker = 179490, Witch Doctor's Chest
          = 141596, Relic Coffer = 160836, Dark Coffer = 160845, Fengus's Chest
          = 179516, Supply Crate = 176224/181085, Malor's Strongbox = 176112

          Other:

          Shallow Grave (Zul'Farrak) = 128308/128403, Grim Guzzler Boar
          (Blackrock Depths) = 165739, Dark Iron Ale Mug (Blackrock Depths) =
          165738, Father Flame (Blackrock Spire) = 175245, Unforged Runic
          Breastplate (Blackrock Spire) = 175970, Blacksmithing Plans
