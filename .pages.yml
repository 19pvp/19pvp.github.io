                       CLEANING_FLAG_SPELLS                = 0x4
                       CLEANING_FLAG_TALENTS               = 0x8
                       CLEANING_FLAG_QUESTSTATUS           = 0x10
          Note:        Before use this feature, make a backup of your database.

          Example:     14 - (CLEANING_FLAG_SKILLS + CLEANING_FLAG_SPELLS +
