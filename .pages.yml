      - name: Calculate.Gameoject.Zone.Area.Data
        label: Calculate Gameoject Zone Area Data
        type: string
        description: >-
          Description: Calculate at loading gameobject zoneId / areaId and save
          in gameobject table
                       WARNING: SLOW WORLD SERVER STARTUP. Should only be used for debugging.
          Default:     0 - (Do not show)
        default: '0'
      - name: DailyRBGArenaPoints.MinLevel
        label: Daily RBGArena Points Min Level
        type: string
        description: >-
          Description: Allows gaining arena points on the first RBG win at level
          70.

          Default:     71 - (Blizzlike)
        default: '71'
      - name: MunchingBlizzlike.Enabled
        label: Munching Blizzlike Enabled
        type: string
        description: >-
          Description: Enable the Blizzlike implementation of munching with e.g.
          Warrior's Rend or Mage's Ignite

          Default:     1 - (Blizzlike)
        default: '1'
      - name: Daze.Enabled
        label: Daze Enabled
        type: string
        description: >-
          Description: Enable or disable the chance for mob melee attacks to
          daze the victim.

          Default:     1 - (Blizzlike)
        default: '1'
      - name: InfiniteAmmo.Enabled
        label: Infinite Ammo Enabled
        type: string
        description: >-
          Description: Enable or disable ammo consumption for ranged attacks and
          thrown weapons.

          Default:     0 - (Blizzlike)
        default: '0'
      - name: Debug.Battleground
        label: Debug Battleground
        type: string
        description: >-
          Description: Enable or disable Battleground 1v0 mode. (If enabled, the
          in-game command is disabled.)

          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Debug.Arena
        label: Debug Arena
        type: string
        description: >-
          Description: Enable or disable Arena 1v1 mode. (If enabled, the
          in-game command is disabled.)

          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Debug.LFG
        label: Debug LFG
        type: string
        description: >-
          Description: Enable or disable LFG 1 player queue mode. (If enabled,
          the in-game command is disabled.)

          Default:     0 - (Disabled)
                       1 - (Enabled)
        default: '0'
      - name: Respawn.DynamicRateCreature
        label: Respawn Dynamic Rate Creature
        type: string
        description: >-
          Description: Controls how creature respawn times adjust based on
          player count in a zone.
                       The respawn time is unchanged up to the configured number of players.
                       As player count exceeds this value, respawn times decrease proportionally
                       (e.g., at double the player count, respawn times are halved; at triple the player count, respawns happen three times as fast).
                       Does not affect instanced creatures, bosses, or quest givers.
          Formula:     adjustFactor = rate / playerCount
                       RespawnTime = RespawnTime * adjustFactor
          Default:     1 (Disabled)
        default: '1'
      - name: Respawn.DynamicMinimumCreature
        label: Respawn Dynamic Minimum Creature
        type: string
        description: >-
          Description: The minimum respawn time for a creature under dynamic
          scaling.

          Default:     10 - (10 seconds)
        default: '10'
      - name: Respawn.DynamicRateGameObject
        label: Respawn Dynamic Rate Game Object
        type: string
        description: >-
          Description: Controls how gameobject respawn times adjust based on
          player count in a zone.
                       The respawn time is unchanged up to the configured number of players.
                       As player count exceeds this value, respawn times decrease proportionally
                       (e.g., at double the player count, respawn times are halved; at triple the player count, respawns happen three times as fast).
                       Does not affect instanced objects or quest givers.
          Formula:     adjustFactor = rate / playerCount
                       RespawnTime = RespawnTime * adjustFactor
          Default:     1 (Disabled)
        default: '1'
      - name: Respawn.DynamicMinimumGameObject
        label: Respawn Dynamic Minimum Game Object
        type: string
        description: >-
          Description: The minimum respawn time for a gameobject under dynamic
          scaling.

          Default:     10 - (10 seconds)
        default: '10'
      - name: Respawn.DynamicEscortNPC
        label: Respawn Dynamic Escort NPC
        type: string
        description: |-
          Description: Enable dynamic respawn behavior for escort quest NPCs.
                       When enabled, escort NPCs in spawn groups flagged as ESCORTQUESTNPC
                       will use special respawn handling.
          Default:     0 - (Disabled)
        default: '0'
      - name: Respawn.ForceCompatibilityMode
        label: Respawn Force Compatibility Mode
        type: string
        description: >-
          Description: Force all spawns to use legacy (compatibility mode)
          respawn behavior,
                       regardless of their spawn group flags. When enabled, creatures and
                       gameobjects respawn in-place as they always have in AzerothCore.
                       Set to 1 to force legacy behavior for all spawns.
          Default:     0 - (Disabled, spawn groups control respawn mode)
        default: '0'
  - name: ale
    label: ALE Config
    type: file
    path: config/ale.json
    fields:
      - name: ALE.Enabled
        label: ALE Enabled
        type: string
        default: 'true'
      - name: ALE.TraceBack
        label: ALE Trace Back
        type: string
        default: 'false'
      - name: ALE.ScriptPath
        label: ALE Script Path
        type: string
        default: '"lua_scripts"'
      - name: ALE.PlayerAnnounceReload
        label: ALE Player Announce Reload
        type: string
        default: 'false'
      - name: ALE.RequirePaths
        label: ALE Require Paths
        type: string
        default: '""'
      - name: ALE.RequireCPaths
        label: ALE Require CPaths
        type: string
        default: '""'
      - name: ALE.AutoReload
        label: ALE Auto Reload
        type: string
        default: 'false'
      - name: ALE.AutoReloadInterval
        label: ALE Auto Reload Interval
        type: string
        default: '1'
      - name: ALE.BytecodeCache
        label: ALE Bytecode Cache
        type: string
        default: 'true'
      - name: Appender.ALELog
        label: Appender ALELog
        type: string
        description: |-
          Description: Defines 'where to log'.
          Format:      Type,LogLevel,Flags,optional1,optional2,optional3
                       Type
                           0 - (None)
                           1 - (Console)
                           2 - (File)
                           3 - (DB)
                       LogLevel
                           0 - (Disabled)
                           1 - (Fatal)
                           2 - (Error)
                           3 - (Warning)
                           4 - (Info)
                           5 - (Debug)
                           6 - (Trace)
                       Flags:
                           0 - None
                           1 - Prefix Timestamp to the text
                           2 - Prefix Log Level to the text
                           4 - Prefix Log Filter type to the text
                           8 - Append timestamp to the log file name. Format: YYYY-MM-DD_HH-MM-SS
                               (Only used with Type = 2)
                          16 - Make a backup of existing file before overwrite
                               (Only used with Mode = w)
                       Colors (read as optional1 if Type = Console)
                           Format: "fatal error warn info debug trace"
                           0 - BLACK
                           1 - RED
                           2 - GREEN
                           3 - BROWN
                           4 - BLUE
                           5 - MAGENTA
                           6 - CYAN
                           7 - GREY
                           8 - YELLOW
                           9 - LRED
                          10 - LGREEN
                          11 - LBLUE
                          12 - LMAGENTA
                          13 - LCYAN
                          14 - WHITE
                           Example: "1 9 3 6 5 8"
                       File: Name of the file (read as optional1 if Type = File)
                           Allows to use one "%s" to create dynamic files
                       Mode: Mode to open the file (read as optional2 if Type = File)
                            a - (Append)
                            w - (Overwrite)
                       MaxFileSize: Maximum file size of the log file before creating a new log file
                       (read as optional3 if Type = File)
                           Size is measured in bytes expressed in a 64-bit unsigned integer.
                           Maximum value is 4294967295 (4 GB). Leave blank for no limit.
                           NOTE: Does not work with dynamic filenames.
                           Example:  536870912 (512 MB)
        default: '2,5,0,ALE.log,w'
      - name: Appender.ALEConsole
        label: Appender ALEConsole
        type: string
        description: LOGGING SYSTEM SETTINGS
        default: '1,4,0,"0 9 0 3 5 0"'
      - name: Logger.ALE
        label: Logger ALE
        type: string
        description: |-
          Description: Defines 'What to log'
          Format:      LogLevel,AppenderList
                       LogLevel
                           0 - (Disabled)
                           1 - (Fatal)
                           2 - (Error)
                           3 - (Warning)
                           4 - (Info)
                           5 - (Debug)
                           6 - (Trace)
                       AppenderList: List of appenders linked to logger
                       (Using spaces as separator).
        default: '4,ALELog ALEConsole'
  - name: playerbots
    label: Playerbots Config
    type: file
    path: config/playerbots.json
    fields:
      - name: AiPlayerbot.Enabled
        label: Ai Playerbot Enabled
        type: string
        description: Enable or disable Playerbots module
        default: '1'
      - name: AiPlayerbot.RandomBotAutologin
        label: Ai Playerbot Random Bot Autologin
        type: string
        description: Enable randombot system
        default: '1'
      - name: AiPlayerbot.MinRandomBots
        label: Ai Playerbot Min Random Bots
        type: string
        description: Randombot count
        default: '500'
      - name: AiPlayerbot.MaxRandomBots
        label: Ai Playerbot Max Random Bots
        type: string
        description: GENERAL SETTINGS
        default: '500'
      - name: AiPlayerbot.RandomBotAccountCount
        label: Ai Playerbot Random Bot Account Count
        type: string
        description: >-
          Randombot accounts

          Set to 0 to automatically calculate needed accounts based on
          MaxRandomBots, EnablePeriodicOnlineOffline

          and its ratio, and AddClassAccountPoolSize. Set manually if you want
          to create more accounts than needed.

          If the manual value is less than the required, the system will
          override it with the required value.

          Default: 0 (automatic)
        default: '0'
      - name: AiPlayerbot.AddClassAccountPoolSize
        label: Ai Playerbot Add Class Account Pool Size
        type: string
        description: >-
          Addclass accounts

          Number of accounts created for bots reserved for the addclass command.
          As with randombots, each account has

          10 bots (or 9 if WotLK is disabled), one bot for each class.
        default: '50'
      - name: AiPlayerbot.RandomBotAccountPrefix
        label: Ai Playerbot Random Bot Account Prefix
        type: string
        description: |-
          Prefix for created bot accounts (of any type).
          Do not change this prefix while there are existing bot accounts.
        default: '"rndbot"'
      - name: AiPlayerbot.DeleteRandomBotAccounts
        label: Ai Playerbot Delete Random Bot Accounts
        type: string
        description: >-
          Delete all randombot accounts

          To apply this, set the number to 1 and run the Worldserver. Once
          deletion is complete, if you would

          like to recreate randombots, set the number back to 0 and rerun the
          Worldserver.
        default: '0'
      - name: AiPlayerbot.DisabledWithoutRealPlayer
        label: Ai Playerbot Disabled Without Real Player
        type: string
        description: >-
          Disable randombots when no real players are logged in

          Default: 0 (randombots will login when server starts)

          If enabled, randombots will only log in 30 seconds (default) after a
          real player logs in, and will

          log out 300 seconds (default) after all real players log out
        default: '0'
      - name: AiPlayerbot.DisabledWithoutRealPlayerLoginDelay
        label: Ai Playerbot Disabled Without Real Player Login Delay
        type: string
        description: log out 300 seconds (default) after all real players log out
        default: '30'
      - name: AiPlayerbot.DisabledWithoutRealPlayerLogoutDelay
        label: Ai Playerbot Disabled Without Real Player Logout Delay
        type: string
        description: log out 300 seconds (default) after all real players log out
        default: '300'
      - name: AiPlayerbot.MaxAddedBots
        label: Ai Playerbot Max Added Bots
        type: string
        description: The maximum number of bots that a player can control simultaneously
        default: '40'
      - name: AiPlayerbot.AddClassCommand
        label: Ai Playerbot Add Class Command
        type: string
        description: >-
          Enable/Disable creating bots by addclass command (0 = GM only, 1 =
          enabled)

          Default: 1 (enabled)
        default: '1'
      - name: AiPlayerbot.GroupInvitationPermission
        label: Ai Playerbot Group Invitation Permission
        type: string
        description: >-
          Bot group invitation permission level (0 = GM only, 1 = accept based
          on level, 2 = always accept)

          Default: 1 (accept based on level)
        default: '1'
      - name: AiPlayerbot.KeepAltsInGroup
        label: Ai Playerbot Keep Alts In Group
        type: string
        description: |-
          Keep altbots in the party even when the master leaves
          0 = disabled (default behavior)
          1 = enabled (prevents bots from automatically leaving the group)
        default: '0'
      - name: AiPlayerbot.BotAutologin
        label: Ai Playerbot Bot Autologin
        type: string
        description: Auto-login all player alts as altbots on player login
        default: '0'
      - name: AiPlayerbot.AllowAccountBots
        label: Ai Playerbot Allow Account Bots
        type: string
        description: Allow/deny inviting altbots from the player's account
        default: '1'
      - name: AiPlayerbot.AllowGuildBots
        label: Ai Playerbot Allow Guild Bots
        type: string
        description: Allow/deny inviting altbots in the player's guild
        default: '1'
      - name: AiPlayerbot.AllowTrustedAccountBots
        label: Ai Playerbot Allow Trusted Account Bots
        type: string
        description: Allow linking accounts for shared altbot control
        default: '1'
      - name: AiPlayerbot.RandomBotGuildNearby
        label: Ai Playerbot Random Bot Guild Nearby
        type: string
        description: >-
          Randombots will create guilds with nearby randombots

          Note: currently, randombots will not invite more bots after a guild is
          created,

          meaning randombot guilds will have only the 10 initial randombots
          needed to sign the charter

          Default: 0 (disabled)
        default: '0'
      - name: AiPlayerbot.RandomBotGuildCount
        label: Ai Playerbot Random Bot Guild Count
        type: string
        description: Number of guilds created by randombots
        default: '20'
      - name: AiPlayerbot.RandomBotGuildSizeMax
        label: Ai Playerbot Random Bot Guild Size Max
        type: string
        description: >-
          Maximum number of members in randombot guilds (minimum is hardcoded to
