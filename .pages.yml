                       |     73822 |    30% |    Horde |
          Default:     ICC.Buff.Alliance = 73828
                       ICC.Buff.Horde    = 73822
        default: '73822'
      - name: WipeGunshipBlizzlike.Enable
        label: Wipe Gunship Blizzlike Enable
        type: string
        description: |-
          escription: Wipe the gunship fight if no player is on the deck.
          efault:     1 - (Blizzlike)
