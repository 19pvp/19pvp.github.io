        default: '0'
      - name: AiPlayerbot.SummonWhenGroup
        label: Ai Playerbot Summon When Group
        type: string
        description: >-
          Bots will be automatically summoned to the player when they accept a
          group invitation
        default: '1'
      - name: AiPlayerbot.SelfBotLevel
        label: Ai Playerbot Self Bot Level
        type: string
        description: >-
