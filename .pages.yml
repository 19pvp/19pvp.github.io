        label: Ai Playerbot Bot Active Alone Force When In Radius
        type: string
        description: >-
          Force-active rules (1 = on, 0 = off)

          These override the percentage above. If any of these conditions is
          true, the bot stays active.

          InRadius  - A real player is within this many yards (set to 0 to
          disable).

          InZone    - A real player is in the same zone (e.g. Elwynn Forest).

          InMap     - A real player is on the same continent (e.g. Eastern
          Kingdoms).

          IsFriend  - A real player has this bot on their friends list.

          InGuild   - This bot is in a guild that has a real player in it.

