      - name: AiPlayerbot.botActiveAloneSmartScale
        label: Ai Playerbot Bot Active Alone Smart Scale
        type: string
        description: >-
          SmartScale — automatically reduces active bots when the server is
          struggling.

          Monitors the server's update time (how long each server tick takes in
          milliseconds).

          When the server slows down, fewer bots are kept active to reduce load.

          mple: BotActiveAlone=10, floor=50, ceiling=200

          erver at 50ms  → ~10% active (no reduction)

          erver at 125ms → ~5% active (half reduction)

          erver at 200ms → 0% active (only forced bots remain)

          MinLevel/MaxLevel — only bots within this level range are affected by
          SmartScale.
