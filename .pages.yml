        default: '15'
      - name: AiPlayerbot.DeleteRandomBotGuilds
        label: Ai Playerbot Delete Random Bot Guilds
        type: string
        description: Delete all randombot guilds if set to 1
        default: '0'
      - name: AiPlayerbot.RandomBotInvitePlayer
        label: Ai Playerbot Random Bot Invite Player
        type: string
        description: Randombots will invite players to groups/raids/guilds
        default: '0'
      - name: AiPlayerbot.InviteChat
        label: Ai Playerbot Invite Chat
        type: string
        description: >-
          Bots will chat in say/guild when they invite other bots to
