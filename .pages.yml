          bots will be active.

          - The active bots rotate: every <DurationSeconds> a different set of
          bots takes a turn.

          - The real number of active bots will always be higher than this
          value, because bots in

          - Set to 100 (with SmartScale off) = all bots always active. Maximum
          server load.

          - Set to 0 = only bots that match a force rule below will be active.

          BotActiveAloneDurationSeconds

          - How often the active roster rotates (in seconds). A different group
          of bots wakes up

          - This is a minimum, not exact. If a bot is in combat or meets any
          force rule when the
        default: '10'
