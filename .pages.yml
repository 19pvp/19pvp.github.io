          Default: 1 (enabled)
        default: '1'
      - name: AiPlayerbot.AutoGearBisCommand
        label: Ai Playerbot Auto Gear Bis Command
        type: string
        description: >-
          If 1 (enabled) chat command: autogear bis, gives bots BiS gear from
          the playerbots_bis_gear table

          whose item-level floor matches AutoGearScoreLimit (e.g. 290 = ICC, 245
          = ToC,

          125 = Kara, 78 = MC). See the AutoGearScoreLimit comment below for the
          full list.

          chat command: autogear bis x, (x must be positive integer) will give
          items based on value of x.

          If x is bigger than AutoGearScoreLimit, bis wont be given, if lower it
          will match x when giving items.

          Commands falls back to autogear when no tier matches or the table is
          empty for the bot's class/spec.

          Requires AutoGearQualityLimit = 4 and AutoGearCommand = 1.

          If AutoGearCommandAltBots = 1 it will be anbled for alt bots.

          Default: 0 (disabled)
        default: '0'
      - name: AiPlayerbot.AutoGearQualityLimit
        label: Ai Playerbot Auto Gear Quality Limit
        type: string
        description: >-
          Equipment quality limitation for autogear command (1 = normal, 2 =
          uncommon, 3 = rare, 4 = epic, 5 = legendary)

          Default: 3 (rare)
        default: '3'
      - name: AiPlayerbot.AutoGearScoreLimit
        label: Ai Playerbot Auto Gear Score Limit
        type: string
        description: >-
          Max iLVL Tier 4 = 120 | Tier 5 = 133 | Tier 6 = 164

          Max iLVL Phase 1(Kara, Gruul, Mag) = 125 | Phase 2(SSC, TK, ZA) = 141
          | Phase 3(Hyjal, BT) = 156 | Phase 4(Sunwell) = 164

          WotLK

          Max iLVL Tier 7(10/25) = 200/213 | Tier 8(10/25) = 225/232 | Tier
          9(10/25) = 232/245 | Tier 10(10/25/HC) = 251/264/290

          Max iLVL Phase 1(Naxx) = 224 | Phase 2(Ulduar) = 245 | Phase 3(ToC) =
          258 | Phase 4(ICC) = 290

          Default: 0 (no limit)
        default: '0'
      - name: AiPlayerbot.BotCheats
        label: Ai Playerbot Bot Cheats
        type: string
        description: >-
          Enable/Disable cheats for bots

          "food" (bots eat or drink without using food or drinks from their
          inventory)

          "gold" (bots have infinite gold)

          "health" (bots immediately regenerate lost health)

          "mana" (bots have infinite mana)

          "power" (bots have infinite energy, rage, and runic power)

          "taxi" (bots may use all flight paths, though they will not actually
          learn them)

          "raid" (bots use certain cheats implemented into raid strategies)

          To use multiple cheats, separate them by commas below (e.g., to enable
          all, use "gold,health,mana,power,raid,taxi")

          Default: food, taxi, and raid are enabled
        default: '"food,taxi,raid"'
